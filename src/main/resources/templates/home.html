<!DOCTYPE html>
<html lang="en"
      th:replace="~{base :: parent(~{::#content}, 'Home')}">

<body>

  <div id="content" class="flex items-center justify-center min-h-screen">

    <div class="bg-gray-100 dark:bg-gray-800 
                p-6 rounded-lg shadow-md w-80 text-center">

      <h1 class="text-2xl font-bold text-blue-500">
        PeopleDesk
      </h1>

      <h3 class="mt-2 text-lg">
        Manage your contacts smarter
      </h3>

      <p class="text-gray-500 dark:text-gray-400 text-sm">
        Your all-in-one contact management solution.
      </p>

      <hr class="my-4">

      <!-- Dynamic Data -->
      <h3 data-th-text="'Welcome, ' + ${name}" 
          class="text-lg font-semibold">
        Welcome User
      </h3>

      <p data-th-text="${email}" 
         class="text-gray-500 dark:text-gray-400 text-sm">
        email@example.com
      </p>

      <hr class="my-4">

      <div class="flex justify-center gap-4 text-sm">
        <a th:href="@{/}" class="text-blue-500 hover:underline">Home</a>
        <a th:href="@{/login}" class="text-blue-500 hover:underline">Login</a>
        <a th:href="@{/signup}" class="text-blue-500 hover:underline">Signup</a>
      </div>

    </div>

  </div>

</body>
</html>
