<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PeopleDesk</title> 
    <link rel="stylesheet" data-th-href="@{/css/output.css}">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />

</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-6 rounded-lg shadow-lg w-80 text-center">

        <h1 class="text-2xl font-bold text-blue-400">PeopleDesk</h1>

        <h3 class="mt-2 text-lg">Manage your contacts smarter</h3>
        <p class="text-gray-400 text-sm">Your all-in-one contact management solution.</p>

        <hr class="my-4 border-gray-600">

        <!-- 🔥 Dynamic Data -->
        <h3 data-th-text="'Welcome, ' + ${name}" class="text-lg font-semibold">
            Welcome User
        </h3>

        <p data-th-text="${email}" class="text-gray-400 text-sm">
            email@example.com
        </p>

        <hr class="my-4 border-gray-600">

        <div class="flex justify-center gap-4 text-sm">
            <a data-th-href="@{/}" class="text-blue-400 hover:underline">Home</a>
            <a data-th-href="@{/login}" class="text-blue-400 hover:underline">Login</a>
            <a data-th-href="@{/register}" class="text-blue-400 hover:underline">Register</a>
        </div>

    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>

</body>
</html>
